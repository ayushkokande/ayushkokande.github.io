<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%237bff9f'/%3E%3C/svg%3E">

  {% seo %}
</head>
<body>

<header class="site-header">
  <div class="container">
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        <span class="nav-logo-dot"></span>
        <span>{{ site.author | downcase | replace: ' ', '.' }}</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/#work' | relative_url }}">work</a></li>
        <li><a href="{{ '/#experience' | relative_url }}">experience</a></li>
        <li><a href="{{ '/#about' | relative_url }}">about</a></li>
        <li><a href="{{ '/#contact' | relative_url }}">contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="container" style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
    <span>© {{ site.time | date: '%Y' }} · {{ site.author }}</span>
    <span>built with jekyll · hosted on github pages</span>
  </div>
</footer>

<script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
