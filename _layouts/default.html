<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <title>{% if page.title and page.title != "" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%230e7c74'/%3E%3C/svg%3E">

  {% seo %}
</head>
<body>

<header class="site-header">
  <nav class="wrap nav">
    <a href="{{ '/' | relative_url }}" class="nav-home"></a>
    <ul class="nav-links">
      <li><a href="{{ '/#projects' | relative_url }}">projects</a></li>
      <li><a href="{{ '/#experience' | relative_url }}">experience</a></li>
      <li><a href="{{ '/#publications' | relative_url }}">publications</a></li>
      <li><a href="{{ '/#contact' | relative_url }}">contact</a></li>
    </ul>
  </nav>
</header>

<main class="wrap">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">
    © {{ site.time | date: '%Y' }} {{ site.author }} · built with Jekyll, hosted on GitHub Pages
  </div>
</footer>

</body>
</html>
