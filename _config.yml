# Site settings — EDIT THESE
title: "Your Name"
tagline: "MS CS @ NYU Courant · ML/AI Research"
description: "Machine learning research, mechanistic interpretability, LLM evaluations."
author: "Your Name"
email: "you@nyu.edu"
url: "https://yourusername.github.io"

# Social links
github_username: "yourusername"
linkedin_username: "yourusername"
twitter_username: "yourusername"
google_scholar: ""  # full URL, optional

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Default front matter
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
